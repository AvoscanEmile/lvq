name: Continuous Deployment

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch: 

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract Tag Version
        id: get_tag
        # Extracts '0.1.1' from 'refs/tags/v0.1.1'
        run: echo "TAG_VER=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Extract Cargo.toml Version
        id: get_cargo
        # Uses grep/sed to find the first version line in Cargo.toml
        run: |
          CARGO_VER=$(grep -m 1 '^version =' Cargo.toml | cut -d '"' -f 2)
          echo "CARGO_VER=$CARGO_VER" >> $GITHUB_OUTPUT

      - name: Compare Versions
        run: |
          echo "Checking version consistency..."
          echo "Tag Version: ${{ steps.get_tag.outputs.TAG_VER }}"
          echo "Cargo.toml Version: ${{ steps.get_cargo.outputs.CARGO_VER }}"
          
          if [ "${{ steps.get_tag.outputs.TAG_VER }}" != "${{ steps.get_cargo.outputs.CARGO_VER }}" ]; then
            echo "::error::Version Mismatch! Tag is ${{ steps.get_tag.outputs.TAG_VER }} but Cargo.toml is ${{ steps.get_cargo.outputs.CARGO_VER }}"
            exit 1
          fi
          echo "Versions match. Proceeding with CD..."
  # 1. Standard Unit & Property Tests
  test:
    name: Unit & Property Tests
    runs-on: ubuntu-latest
    env:
      PROPTEST_CASES: 100000
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Cargo Test
        run: cargo test --verbose

  # 2. Formal Verification with Kani
  verification:
    name: Kani Formal Proofs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify with Kani
        uses: model-checking/kani-github-action@v1
        with:
          args: "--tests"

  # 3. Fuzzing Smoke Test
  fuzz:
    name: Fuzz Crash Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nightly Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Run Fuzzer
        run: cargo +nightly fuzz run full_pipeline -- -max_total_time=600
  # 4. The Actual Release (The "CD" part)
  release:
    name: Build and Publish Release
    # CRITICAL: This line forces GitHub to wait. If ANY test fails, this job never runs.
    needs: [test, verification, fuzz] 
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a GitHub Release
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        
      - name: Build Optimized Binary
        # Compiles the final, high-performance executable
        run: cargo build --release 
        
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        # Only trigger the actual release creation if this was a tag push
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/release/lvq
          generate_release_notes: true # Auto-generates notes from merged PRs!
